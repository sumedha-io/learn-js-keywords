name: JavaScript Scope Course

on:
  push:

jobs:
  verify-step:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate submission
        run: node .github/scripts/validate.js
